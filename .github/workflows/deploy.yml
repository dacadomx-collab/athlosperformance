# ===================================================================
# AUTOMATED DEPLOYMENT WORKFLOW — ATHLOS PERFORMANCE BCS
# Build estatico (Next.js output: "export") + despliegue FTP a cPanel
# ===================================================================

name: Pipeline de Despliegue Automatizado Athlos Performance

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Estatico y Despliegue FTP
    runs-on: ubuntu-latest

    steps:
      - name: "🚚 Paso 1: Clonar Repositorio"
        uses: actions/checkout@v4

      - name: "📦 Paso 2: Configurar pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: "🟢 Paso 3: Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: "⬇️ Paso 4: Instalar Dependencias"
        run: pnpm install --frozen-lockfile

      - name: "🏗️ Paso 5: Construir Sitio Estatico (next build → /out)"
        run: pnpm build

      - name: "🚀 Paso 6: Desplegar /out via FTP a cPanel"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.tourfindy.com
          username: ftp_user@athlosperformance.tourfindy.com
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./out/
          server-dir: /home/tourfindycom/public_html/athlosperformance/
